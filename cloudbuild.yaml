# ─────────────────────────────────────────────────────────────────────────────
# Google Cloud Build – build and push the Docker image to Artifact Registry.
#
# SECRETS
# -------
# Never pass API keys as plain substitution variables (_VAR=value on the CLI).
# Instead, store each secret in Google Cloud Secret Manager and reference it
# here via the `availableSecrets` block.  Cloud Build will inject the value as
# an environment variable that is available only inside the build step that
# declares it – it is never written to build logs.
#
# One-time setup per secret (example for VITE_GEMINI_API_KEY):
#   gcloud secrets create VITE_GEMINI_API_KEY --replication-policy=automatic
#   echo -n "YOUR_VALUE" | gcloud secrets versions add VITE_GEMINI_API_KEY --data-file=-
#   gcloud secrets add-iam-policy-binding VITE_GEMINI_API_KEY \
#     --member="serviceAccount:$(gcloud projects describe $PROJECT_ID \
#               --format='value(projectNumber)')@cloudbuild.gserviceaccount.com" \
#     --role="roles/secretmanager.secretAccessor"
#
# Repeat for: VITE_GOOGLE_CLIENT_ID, VITE_GOOGLE_APP_ID, VITE_GOOGLE_API_KEY,
#             VITE_GCP_PROJECT_ID, VITE_GCS_BUCKET, VITE_REC_FOLDER_ID
#
# TRIGGERING A BUILD
# ------------------
#   gcloud builds submit \
#     --config=cloudbuild.yaml \
#     --substitutions=_IMAGE_TAG=latest .
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: us-central1
  _REPO: smart-transcription
  _SERVICE: smart-transcription
  _IMAGE_TAG: latest

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/VITE_GOOGLE_CLIENT_ID/versions/latest
      env: VITE_GOOGLE_CLIENT_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_GOOGLE_APP_ID/versions/latest
      env: VITE_GOOGLE_APP_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_GOOGLE_API_KEY/versions/latest
      env: VITE_GOOGLE_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/VITE_GEMINI_API_KEY/versions/latest
      env: VITE_GEMINI_API_KEY
    - versionName: projects/$PROJECT_ID/secrets/VITE_GCP_PROJECT_ID/versions/latest
      env: VITE_GCP_PROJECT_ID
    - versionName: projects/$PROJECT_ID/secrets/VITE_GCS_BUCKET/versions/latest
      env: VITE_GCS_BUCKET
    - versionName: projects/$PROJECT_ID/secrets/VITE_REC_FOLDER_ID/versions/latest
      env: VITE_REC_FOLDER_ID

steps:
  # Build the Docker image, forwarding each secret as a --build-arg so that
  # Vite can bake the values into the static JS bundle at build time.
  - name: gcr.io/cloud-builders/docker
    secretEnv:
      - VITE_GOOGLE_CLIENT_ID
      - VITE_GOOGLE_APP_ID
      - VITE_GOOGLE_API_KEY
      - VITE_GEMINI_API_KEY
      - VITE_GCP_PROJECT_ID
      - VITE_GCS_BUCKET
      - VITE_REC_FOLDER_ID
    args:
      - build
      - --build-arg=VITE_GOOGLE_CLIENT_ID=$$VITE_GOOGLE_CLIENT_ID
      - --build-arg=VITE_GOOGLE_APP_ID=$$VITE_GOOGLE_APP_ID
      - --build-arg=VITE_GOOGLE_API_KEY=$$VITE_GOOGLE_API_KEY
      - --build-arg=VITE_GEMINI_API_KEY=$$VITE_GEMINI_API_KEY
      - --build-arg=VITE_GCP_PROJECT_ID=$$VITE_GCP_PROJECT_ID
      - --build-arg=VITE_GCS_BUCKET=$$VITE_GCS_BUCKET
      - --build-arg=VITE_REC_FOLDER_ID=$$VITE_REC_FOLDER_ID
      - --tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$_IMAGE_TAG
      - .

  # Push the image to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$_IMAGE_TAG

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$_IMAGE_TAG
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$_IMAGE_TAG
